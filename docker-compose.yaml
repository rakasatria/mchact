services:
  mchact:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mchact
    command: ["start"]
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    volumes:
      - ./mchact.config.yaml:/app/mchact.config.yaml:ro
      # Default data_dir resolves to ~/.mchact; persist it on the host.
      - ./data:/home/mchact/.mchact
      - ./tmp:/app/tmp
    environment:
      - RUST_LOG=info
      - HOME=/home/mchact
    ports:
      - "127.0.0.1:10961:10961" # Uncomment and adjust if you plan to use Mchact's web UI
