[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "deny"
# Temporary exception for the 2026-03-20 rustls-webpki advisory while the
# upstream rustls/tokio-tungstenite/serenity dependency chain catches up.
ignore = [
  "RUSTSEC-2026-0049",
  # `instant` and `paste` are transitive deps of azure_core v0.21; awaiting
  # Azure SDK upgrade to drop them.
  "RUSTSEC-2024-0384",
  "RUSTSEC-2024-0436",
]

[bans]
# The current graph includes several unavoidable duplicate transitive versions
# across Matrix, Telegram, and OTLP stacks; keep bans focused on actual risks.
multiple-versions = "allow"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
